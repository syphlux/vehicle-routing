<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Routing Problem</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>VRP Demo</h1>
      <p class="subtitle">Pickup &amp; Delivery · Vehicle Capacity</p>
    </div>

    <div id="phase-create">
      <div class="section">
        <h2>Placement Mode</h2>
        <label class="radio-label">
          <input type="radio" name="mode" value="delivery" checked>
          <span class="radio-dot delivery"></span> Add Delivery
        </label>
        <label class="radio-label">
          <input type="radio" name="mode" value="vehicle">
          <span class="radio-icon">🚚</span> Add Vehicle
        </label>
      </div>

      <div class="section" id="vehicle-options" style="display:none">
        <h2>Vehicle Capacity</h2>
        <div class="input-row">
          <input type="number" id="vehicle-capacity" value="3" min="1" max="50">
          <span class="input-hint">packages</span>
        </div>
      </div>

      <div class="section">
        <div id="item-count">
          <span id="vehicle-count">0 vehicles</span>
          <span class="sep">·</span>
          <span id="delivery-count">0 deliveries</span>
        </div>
        <div id="pending-hint" class="hint hidden">Click map for dropoff location…</div>
      </div>

      <div class="section actions">
        <button id="btn-generate" class="btn btn-primary">Generate Routes</button>
        <button id="btn-clear" class="btn btn-secondary">Clear All</button>
      </div>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Solving… (up to 10 s)</p>
    </div>

    <div id="phase-result" class="hidden">
      <div class="section">
        <h2>Solution</h2>
        <label class="switch-row">
          <span class="switch-label">Detailed</span>
          <span class="switch">
            <input type="checkbox" id="toggle-display-mode" checked>
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </span>
        </label>
        <div id="solver-status"></div>
        <div id="route-stats"></div>
      </div>
      <div class="section actions">
        <button id="btn-download-json" class="btn btn-secondary">Download JSON</button>
        <button id="btn-download-csv" class="btn btn-secondary">Download CSV</button>
      </div>
      <div class="section">
        <h2>New Route</h2>
        <label class="switch-row" style="margin-bottom:8px">
          <span class="switch-label">Keep stops</span>
          <span class="switch">
            <input type="checkbox" id="toggle-keep-stops" checked>
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </span>
        </label>
        <div class="actions">
          <button id="btn-new-route" class="btn btn-primary">New Route</button>
        </div>
      </div>
    </div>

    <div class="section legend">
      <h2>Legend</h2>
      <div class="legend-item"><span class="dot green"></span> Pickup</div>
      <div class="legend-item"><span class="dot red"></span> Dropoff</div>
      <div class="legend-item"><span class="legend-vehicle-icon">🚚</span>  &nbsp;Vehicle depot</div>
      <div class="legend-item hint-sm">Right-click any marker to remove it</div>
    </div>
  </div>

  <button id="sidebar-toggle" title="Toggle sidebar"><span class="toggle-chevron">&#8250;</span></button>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
